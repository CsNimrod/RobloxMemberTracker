name: Track Roblox Group Members

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tracker
        env:
          GROUP_IDS: ${{ vars.ROBLOX_GROUP_IDS }}
        run: node scripts/fetch-members.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/members.json
          git diff --staged --quiet || git commit -m "update member stats"
          git push